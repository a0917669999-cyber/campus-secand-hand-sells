{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3 mt-5">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center mb-4 fw-bold">註冊帳號</h3>
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">學校信箱</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="student@university.edu">
                        <div class="form-text">我們需要學校信箱來驗證您的校園身份。</div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">確認密碼</label>
                        <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">建立帳號</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-decoration-none">返回登入</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
