{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3 mt-5">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center mb-4 fw-bold">登入 CampuSwap</h3>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">學校信箱</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="student@university.edu">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">登入</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">還沒有帳號？ <a href="{{ url_for('auth.register') }}" class="text-decoration-none">立即註冊</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
